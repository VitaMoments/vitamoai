name: Epic
description: A large feature or business goal that groups multiple related user stories and tasks.
title: "[Epic]: "
labels: ["type: epic"]
type: Epic
body:
  - type: markdown
    attributes:
      value: |
        Use this template for large product areas, business goals, or major features.

  - type: textarea
    id: goal
    attributes:
      label: Goal
      description: What is the main goal of this epic?
      placeholder: |
        Example: Users should be able to register, log in, verify their email, and recover their password.
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem or opportunity
      description: What problem does this epic solve?
      placeholder: |
        Example: Users currently cannot securely access their personal account.
    validations:
      required: true

  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: What is included in this epic?
      placeholder: |
        - Registration
        - Login
        - Logout
        - Email verification
        - Forgot password
    validations:
      required: true

  - type: textarea
    id: out-of-scope
    attributes:
      label: Out of scope
      description: What is explicitly not part of this epic?
      placeholder: |
        - Social login
        - Two-factor authentication
        - Magic links
    validations:
      required: false

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      description: How important is this epic?
      options:
        - Critical
        - High
        - Medium
        - Low
    validations:
      required: true

  - type: dropdown
    id: effort
    attributes:
      label: Expected size
      description: Rough size of the epic. Split if it becomes too large.
      options:
        - M
        - L
        - XL
    validations:
      required: false

  - type: textarea
    id: user-stories
    attributes:
      label: Related user stories
      description: List the stories that should be created under this epic.
      placeholder: |
        - [ ] As a user, I want to register an account
        - [ ] As a user, I want to verify my email address
        - [ ] As a user, I want to log in
    validations:
      required: false

  - type: textarea
    id: acceptance-criteria
    attributes:
      label: Epic acceptance criteria
      description: When is this epic considered complete?
      placeholder: |
        - [ ] Users can complete the full authentication flow
        - [ ] All related stories are completed
        - [ ] Main edge cases are handled
        - [ ] Feature is tested manually or automatically
    validations:
      required: true