name: Deploy webApp to GitHub Pages

on:
  push:
    branches: ["main"]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: webApp/package-lock.json

      - name: Install dependencies
        working-directory: webApp
        run: npm ci

      - name: Build webApp
        working-directory: webApp
        run: npm run build
        env:
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}

      - name: Show dist contents
        run: |
          echo "Root:"
          ls -la
          echo ""
          echo "webApp:"
          ls -la webApp
          echo ""
          echo "webApp/dist:"
          ls -la webApp/dist
          echo ""
          echo "Files in dist:"
          find webApp/dist -maxdepth 3 -type f
          echo ""
          echo "index.html preview:"
          sed -n '1,80p' webApp/dist/index.html

      - name: Add SPA fallback
        run: cp webApp/dist/index.html webApp/dist/404.html

      - name: Add custom domain
        run: echo "vitamo.eu" > webApp/dist/CNAME

      - uses: actions/upload-pages-artifact@v3
        with:
          path: webApp/dist

  deploy:
    runs-on: ubuntu-latest
    needs: build

    environment:
      name: github-pages

    steps:
      - uses: actions/deploy-pages@v4